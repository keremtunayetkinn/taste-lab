<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ne Pişirsem?</title>
  <meta name="description" content="Elindeki malzemeleri gir, yapay zeka senin için Türk ve dünya mutfağından tarif önersin.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" media="print" id="font-link">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"></noscript>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha256-IGtui7APx7uix+6AykHbPp4FunvgqjWr66nP1TV/XQ4=" crossorigin="anonymous" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dil-toggle">
    <button id="btn-dil-tr" class="active" aria-pressed="true" aria-label="Türkçe">TR</button>
    <button id="btn-dil-en" aria-pressed="false" aria-label="English">EN</button>
  </div>

  <main>
  <!-- HERO -->
  <section id="hero">
    <div class="hero-inner">
      <h1>Ne Pişirsem?</h1>
      <p class="hero-sub" data-i18n="heroSub">Elindeki malzemeleri gir, yapay zeka senin için tarif önersin.</p>
      <button class="btn-primary" id="btn-baslayalim" data-i18n="btnBaslayalim">Hadi Başlayalım →</button>
    </div>
  </section>

  <!-- INPUT PANEL -->
  <section id="input-panel" style="display:none;">
    <div class="container">
      <h2 data-i18n="malzemelerTitle">Malzemeler</h2>

      <div class="malzeme-input-row">
        <input type="text" id="malzeme-input" data-i18n-placeholder="malzemeInputPlaceholder" placeholder="Malzeme ekle (örn: domates)" autocomplete="off">
        <button class="btn-primary" id="btn-malzeme-ekle" data-i18n="btnEkle">Ekle</button>
      </div>

      <div id="malzeme-listesi" class="tag-listesi"></div>

      <div class="filtreler">
        <div class="filtre-blok">
          <label id="sure-label" data-i18n="labelSure">Süre</label>
          <div class="filter-group" role="group" aria-labelledby="sure-label" data-kategori="sure">
            <button class="filter-btn" data-deger="15dk" data-i18n="filter15dk">15 dk</button>
            <button class="filter-btn" data-deger="30dk" data-i18n="filter30dk">30 dk</button>
            <button class="filter-btn" data-deger="1saat" data-i18n="filter1saat">1 saat+</button>
          </div>
        </div>
        <div class="filtre-blok">
          <label id="butce-label" data-i18n="labelButce">Bütçe</label>
          <div class="filter-group" role="group" aria-labelledby="butce-label" data-kategori="butce">
            <button class="filter-btn" data-deger="ekonomik" data-i18n="filterEkonomik">Ekonomik</button>
            <button class="filter-btn" data-deger="orta" data-i18n="filterOrta">Orta</button>
          </div>
        </div>
        <div class="filtre-blok">
          <label id="kisi-label" data-i18n="labelKisi">Kişi Sayısı</label>
          <div class="filter-group" role="group" aria-labelledby="kisi-label" data-kategori="kisi">
            <button class="filter-btn active" data-deger="1" aria-pressed="true" data-i18n="filterKisi1">1 Kişi</button>
            <button class="filter-btn" data-deger="2" data-i18n="filterKisi2">2 Kişi</button>
            <button class="filter-btn" data-deger="4+" data-i18n="filterKisi4">4+ Kişi</button>
          </div>
        </div>
        <div class="filtre-blok">
          <label id="zorluk-label" data-i18n="labelZorluk">Zorluk</label>
          <div class="filter-group" role="group" aria-labelledby="zorluk-label" data-kategori="zorluk">
            <button class="filter-btn" data-deger="kolay" data-i18n="filterKolay">Kolay</button>
            <button class="filter-btn" data-deger="orta" data-i18n="filterOrta">Orta</button>
            <button class="filter-btn" data-deger="zor" data-i18n="filterZor">Zor</button>
          </div>
        </div>
      </div>

      <div id="hata-mesaji" class="hata-mesaji" style="display:none;"></div>

      <button class="btn-primary btn-tarif-ara" id="btn-tarif-ara" data-i18n="btnTarifBul">Tarif Bul ✨</button>

      <!-- FAVORITES -->
      <div id="favoriler-panel" style="display:none;">
        <div class="favoriler-header"></div>
        <div class="favoriler-grid"></div>
      </div>

      <!-- HISTORY -->
      <div id="gecmis-panel" style="display:none;">
        <div class="gecmis-header"></div>
        <div class="gecmis-liste"></div>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results" style="display:none;">
    <div class="container">
      <div class="results-header">
        <h2 data-i18n="tarifOnerileri">Tarif Önerileri</h2>
        <button class="btn-geri" id="btn-geri" data-i18n="btnYeniArama">← Yeni Arama</button>
      </div>
      <div id="tarif-grid" class="grid-tarifler"></div>

    </div>
  </section>

  </main>

  <!-- DETAIL MODAL -->
  <div id="detail-modal" class="modal-overlay" style="display:none;">
    <div class="modal-kart">
      <button class="modal-kapat" id="btn-modal-kapat">✕</button>
      <img id="modal-foto" class="modal-foto" src="" alt="">
      <div class="modal-icerik">
        <h2 id="modal-ad"></h2>
        <p id="modal-aciklama" class="modal-aciklama"></p>
        <div class="modal-meta">
          <span id="modal-sure"></span>
          <span id="modal-zorluk"></span>
          <span id="modal-kisi"></span>
        </div>
        <button id="btn-modal-favori" class="btn-modal-favori"></button>
        <div id="modal-paylas" class="modal-paylas"></div>
        <div class="modal-bolumler">
          <div class="modal-malzemeler">
            <h3 data-i18n="modalMalzemeler">Malzemeler</h3>
            <ul id="modal-malzeme-listesi"></ul>
          </div>
          <div class="modal-adimlar">
            <h3 data-i18n="modalYapilis">Yapılış</h3>
            <ol id="modal-adim-listesi"></ol>
          </div>
        </div>
        <div class="tat-haritasi-container">
          <h3 data-i18n="modalTatHaritasi">Tat Haritası</h3>
          <canvas id="tatChart" width="300" height="300"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
